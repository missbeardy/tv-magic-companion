# Gates pushes and PRs to main on tests + typecheck. Lint runs but is
# non-blocking for now (pre-existing debt); flip it to required once cleared.
# Deliberately does NOT run `npm run build` — that triggers the time-based
# changelog prebuild gate, which would fail unrelated PRs.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
